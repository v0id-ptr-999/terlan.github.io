<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tərlanın Saytı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#bfe0e8;
    --sky-bottom:#eef4e2;
    --brown:#3d2c1f;
    --muted:#6b5a45;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%;
    background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom) 70%);
    font-family:'Nunito', sans-serif;
    color: var(--brown);
  }
  header.hero{
    text-align:center; padding: 34px 20px 6px;
  }
  h1{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size: clamp(24px, 5vw, 40px);
    margin:0;
  }
  .sub{ color:var(--muted); margin-top:6px; font-size:14px; }

  .nav-btn{
    display:inline-block;
    margin-top:16px;
    font-family:'Nunito', sans-serif;
    font-weight:800;
    font-size:14px;
    letter-spacing:.3px;
    color:#fbf6ea;
    background: linear-gradient(135deg, #6b4a2e, #3d2c1f);
    border:none; border-radius:999px;
    padding:12px 26px;
    cursor:pointer;
    text-decoration:none;
    box-shadow: 0 6px 16px rgba(61,44,31,.3);
  }

  .tree-wrap{
    position:relative;
    max-width: 900px;
    margin: 10px auto 10px;
    padding: 0 10px;
  }
  .tree-wrap svg{ display:block; width:100%; height:auto; }

  .placard{
    position:absolute;
    transform: translate(-50%, 0);
    display:flex; flex-direction:column; align-items:center;
  }
  .placard .thread{
    width:1.5px; height:16px;
    background: #6b5a45;
  }
  .placard .board{
    margin-top:-1px;
    background:#fbf6ea;
    border:1.5px solid #8a6d45;
    border-radius: 5px;
    padding: 5px 10px;
    text-align:center;
    box-shadow: 0 3px 6px rgba(61,44,31,.25);
    white-space:nowrap;
    line-height:1.1;
  }
  .placard .t-name{ font-weight:800; font-size: 11.5px; color: var(--brown); }
  .placard .t-rel{ font-size: 8.3px; color: var(--muted); font-weight:600; }
  .placard.root .board{ border-width:2.5px; border-color:#5e4020; }
  .placard.root .t-name{ font-size:14px; color:#4a3320; }
  .placard.root .thread{ height:22px; }

  .region-label{
    position:absolute;
    transform: translate(-50%, -50%);
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size: 20px;
    letter-spacing:3px;
    color: #4a3320;
  }

  footer.cta{ text-align:center; padding: 10px 20px 60px; }

  @media (max-width: 640px){
    .placard .t-name{ font-size:8px; }
    .placard .t-rel{ font-size:5.5px; }
    .region-label{ font-size:13px; }
  }
</style>
</head>
<body>

<header class="hero">
  <p class="sub">Tərlanın Sistemi</p>
  <h1>Bakı Ailəsi</h1>
</header>

<div class="tree-wrap" id="treeWrap">
  <svg viewBox="0 0 900 1000" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="barkGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#2e2015"/>
        <stop offset="50%" stop-color="#5c4023"/>
        <stop offset="100%" stop-color="#3a2818"/>
      </linearGradient>
    </defs>

    <!-- roots -->
    <path d="M450 940 C 410 910, 380 920, 350 950" stroke="#3a2818" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M450 940 C 490 910, 520 920, 550 950" stroke="#3a2818" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M450 940 C 430 922, 420 932, 412 952" stroke="#3a2818" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M450 940 C 470 922, 480 932, 488 952" stroke="#3a2818" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- trunk (organic tapered) -->
    <path d="M420 940 C 414 820, 417 700, 428 610 C 421 590, 419 570, 424 550
             L 476 550 C 481 570, 479 590, 472 610 C 483 700, 486 820, 480 940 Z"
          fill="url(#barkGrad)"/>
    <path d="M436 780 C 431 700, 434 630, 441 570" stroke="#2e2015" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M462 780 C 467 700, 464 630, 457 570" stroke="#2e2015" stroke-width="3" fill="none" opacity="0.5"/>

    <!-- branches -->
    <g stroke="url(#barkGrad)" fill="none" stroke-linecap="round">
      <path d="M450 550 Q 400 460, 340 340" stroke-width="26"/>
      <path d="M450 550 Q 450 460, 450 300" stroke-width="28"/>
      <path d="M450 550 Q 500 460, 560 340" stroke-width="26"/>

      <!-- Sabir&Gülzar to tier2 -->
      <path d="M450 300 Q 380 320, 320 380" stroke-width="16"/>
      <path d="M450 300 L 450 370" stroke-width="16"/>
      <path d="M450 300 Q 520 320, 580 380" stroke-width="16"/>

      <!-- İlqar to tier3 -->
      <path d="M320 400 Q 260 440, 200 500" stroke-width="9"/>
      <path d="M320 400 Q 310 450, 320 510" stroke-width="9"/>
      <path d="M320 400 Q 370 440, 420 500" stroke-width="9"/>
      <!-- Rüfət to tier3 -->
      <path d="M580 400 Q 590 450, 590 510" stroke-width="9"/>
    </g>

    <!-- leaf layer -->
    <g id="leafLayer"></g>
  </svg>

  <div class="region-label" style="top:12%; left:50%;">BAKI</div>

  <div class="placard root" style="top:20%; left:50%;"><div class="thread"></div><div class="board"><div class="t-name">Sabir & Gülzar</div><div class="t-rel">Babam & Nənəm</div></div></div>

  <div class="placard" style="top:31%; left:36.5%;"><div class="thread"></div><div class="board"><div class="t-name">İlqar</div><div class="t-rel">Atam</div></div></div>
  <div class="placard" style="top:26%; left:50%;"><div class="thread"></div><div class="board"><div class="t-name">Afət</div><div class="t-rel">Bibim</div></div></div>
  <div class="placard" style="top:31%; left:63.5%;"><div class="thread"></div><div class="board"><div class="t-name">Rüfət</div><div class="t-rel">Əmim</div></div></div>

  <div class="placard" style="top:43%; left:22%;"><div class="thread"></div><div class="board"><div class="t-name">Kənan</div><div class="t-rel">Qardaşım</div></div></div>
  <div class="placard" style="top:45%; left:36%;"><div class="thread"></div><div class="board"><div class="t-name">Sənan & Hökümə</div><div class="t-rel">Qardaşım & Gəlinim</div></div></div>
  <div class="placard" style="top:43%; left:47%;"><div class="thread"></div><div class="board"><div class="t-name">Şükran</div><div class="t-rel">Bacım</div></div></div>
  <div class="placard" style="top:43%; left:65.5%;"><div class="thread"></div><div class="board"><div class="t-name">Rəvan</div><div class="t-rel">Əmim Oğlu</div></div></div>
</div>

<footer class="cta">
  <a class="nav-btn" href="./3d.html">Gəncə tərəfinə keç →</a>
</footer>

<script>
(function(){
  const svgNS = "http://www.w3.org/2000/svg";
  const layer = document.getElementById('leafLayer');
  const greens = ['#2f6b30','#3f7d3f','#4f8f41','#6bb058','#7cbf66'];
  const autumn = ['#8a6d2e','#a9863d'];

  function leafShape(x, y, scale, angleDeg, color){
    const g = document.createElementNS(svgNS, 'g');
    g.setAttribute('transform', `translate(${x} ${y}) rotate(${angleDeg}) scale(${scale})`);
    const path = document.createElementNS(svgNS, 'path');
    path.setAttribute('d', 'M0,-12 C6,-8 8,0 0,12 C-8,0 -6,-8 0,-12 Z');
    path.setAttribute('fill', color);
    path.setAttribute('opacity', 0.9);
    const vein = document.createElementNS(svgNS, 'line');
    vein.setAttribute('x1',0); vein.setAttribute('y1',-11);
    vein.setAttribute('x2',0); vein.setAttribute('y2',11);
    vein.setAttribute('stroke', 'rgba(0,0,0,.18)');
    vein.setAttribute('stroke-width', 1);
    g.appendChild(path); g.appendChild(vein);
    layer.appendChild(g);
  }

  function inCrown(x, y){
    const lobes = [[340,340,190,150],[450,270,220,170],[560,340,190,150]];
    for(const [lx,ly,rx,ry] of lobes){
      const dx=(x-lx)/rx, dy=(y-ly)/ry;
      if(dx*dx+dy*dy<=1) return true;
    }
    return false;
  }

  let placed = 0, tries = 0;
  const target = 620;
  while(placed < target && tries < target*20){
    tries++;
    const x = 60 + Math.random()*780;
    const y = 90 + Math.random()*350;
    if(!inCrown(x,y)) continue;
    const scale = 0.7 + Math.random()*1.1;
    const angle = Math.random()*360;
    const isAutumn = Math.random() < 0.08;
    const palette = isAutumn ? autumn : greens;
    const color = palette[Math.floor(Math.random()*palette.length)];
    leafShape(x, y, scale, angle, color);
    placed++;
  }
})();
</script>

</body>
</html>
