---
layout: null
---
<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tərlanın Saytı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Caveat:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #faf1e2;
    --paper: #fffaf0;
    --rust: #b5522f;
    --gold: #c8912b;
    --brown: #4a3324;
    --muted: #8a6f56;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%;
    background: var(--cream);
    font-family:'Nunito', sans-serif;
    color: var(--brown);
    overflow-x:hidden;
  }

  /* warm ambient background */
  #warmBg{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(circle at 15% 20%, rgba(200,145,43,.16), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(181,82,47,.14), transparent 40%),
      radial-gradient(circle at 50% 90%, rgba(200,145,43,.12), transparent 50%),
      var(--cream);
    overflow:hidden;
  }
  .mote{
    position:absolute;
    border-radius:50%;
    background: radial-gradient(circle, rgba(200,145,43,.55), rgba(200,145,43,0) 70%);
    animation: float linear infinite;
  }
  @keyframes float{
    from{ transform: translateY(0) translateX(0); }
    to{ transform: translateY(-110vh) translateX(20px); }
  }

  header.hero{
    position:relative; z-index:2;
    text-align:center; padding: 60px 20px 30px;
    opacity:1; visibility:visible;
    transition: opacity 1s ease;
  }
  header.hero.hidden{ opacity:0; visibility:hidden; }
  .eyebrow{
    font-family:'Caveat', cursive;
    font-size:22px;
    color: var(--rust);
    margin:0 0 4px;
  }
  h1{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size: clamp(30px, 6vw, 54px);
    margin:0;
    color: var(--brown);
    letter-spacing: .5px;
  }
  .sub{
    font-family:'Caveat', cursive;
    font-size:20px; color:var(--muted); margin-top:10px;
  }

  #familyScroll{
    position:relative; z-index:2;
  }
  .family-sticky{
    position:sticky; top:0; left:0;
    width:100%; height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    perspective: 1200px;
  }
  .family-index{
    font-family:'Caveat', cursive;
    font-size:20px;
    color: var(--muted);
    margin-bottom:14px;
  }

  .polaroid{
    width:min(300px, 78vw);
    background: var(--paper);
    padding: 18px 18px 34px;
    border-radius: 4px;
    box-shadow: 0 18px 40px rgba(74,51,36,.25), 0 4px 10px rgba(74,51,36,.15);
    transform: rotate(-3deg);
    transition: opacity .2s ease, transform .3s ease;
    text-align:center;
  }
  .polaroid.switching{ opacity:0; transform: rotate(-3deg) scale(.9); }
  .photo-frame{
    width:100%;
    aspect-ratio: 1 / 1;
    border-radius:2px;
    background: linear-gradient(160deg, #e8ba7a, #b5522f);
    display:flex; align-items:center; justify-content:center;
    box-shadow: inset 0 0 0 1px rgba(74,51,36,.08);
  }
  .photo-letter{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:80px;
    color: rgba(255,250,240,.92);
    text-shadow: 0 2px 6px rgba(74,51,36,.35);
  }
  .polaroid .cap-name{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:32px;
    color: var(--brown);
    margin-top:16px;
  }
  .polaroid .cap-rel{
    font-family:'Nunito', sans-serif;
    font-size:13px;
    color: var(--muted);
    letter-spacing:.4px;
    margin-top:2px;
  }
  .tape{
    position:absolute;
    width:70px; height:24px;
    background: rgba(200,145,43,.35);
    top:-10px; left:50%;
    transform: translateX(-50%) rotate(-2deg);
    box-shadow: 0 2px 4px rgba(74,51,36,.15);
  }
  .polaroid-wrap{ position:relative; }

  .fam-nav{
    display:flex; justify-content:center; gap:14px;
    margin-top: 30px;
  }
  .fam-nav-btn{
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:13px; letter-spacing:.3px;
    color: var(--paper);
    background: linear-gradient(135deg, var(--rust), var(--gold));
    border:none; border-radius:999px;
    padding:11px 20px;
    cursor:pointer;
    box-shadow: 0 6px 16px rgba(181,82,47,.35);
  }

  .loader{
    position:fixed; inset:0; z-index:100;
    background: var(--cream);
    display:flex; align-items:center; justify-content:center;
    transition: opacity .8s ease, visibility .8s ease;
  }
  .loader.hide{ opacity:0; visibility:hidden; pointer-events:none; }
  .loader-inner{ text-align:center; width:min(320px, 80vw); }
  .loader-title{
    font-family:'Playfair Display', serif;
    font-weight:900; font-size:26px; margin-bottom:16px;
    color: var(--brown);
  }
  .loader-status{
    font-family:'Caveat', cursive;
    font-size:18px; color:var(--muted); margin-bottom:16px;
    min-height:20px;
  }
  .loader-bar{
    width:100%; height:4px; border-radius:999px; background: rgba(74,51,36,.12);
    overflow:hidden;
  }
  .loader-fill{
    height:100%; width:0%;
    background: linear-gradient(90deg, var(--rust), var(--gold));
    transition: width .3s ease;
  }
  .loader-percent{
    margin-top:10px; font-family:'Nunito', sans-serif; font-weight:700; font-size:12px; color:var(--rust); letter-spacing:1px;
  }
</style>
</head>
<body>

<div id="warmBg"></div>

<div id="loginOverlay" style="position:fixed; inset:0; z-index:999; background:#faf1e2; display:flex; align-items:center; justify-content:center;">
  <div style="text-align:center;">
    <h2 style="font-family:'Playfair Display', serif; color:#4a3324;">Ailə Kainatına Giriş</h2>
    <input type="password" id="passInput" placeholder="Şifrəni yaz..." style="padding:10px; border-radius:5px; border:1px solid #c8912b;">
    <button onclick="checkPassword()" style="padding:10px 20px; cursor:pointer;">Giriş</button>
    <p id="errorMsg" style="color:red;"></p>
  </div>
</div>

<div class="loader" id="loader">
  <div class="loader-inner">
    <div class="loader-title">Ailə Albomu</div>
    <div class="loader-status" id="loaderStatus">Fotolar tozdan təmizlənir...</div>
    <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
    <div class="loader-percent" id="loaderPercent">0%</div>
  </div>
</div>

<header class="hero" id="heroHeader">
  <p class="eyebrow">Tərlanın Sistemi</p>
  <h1>Ailə Albomu</h1>
  <p class="sub">Növbəti və Əvvəlki düymələrinə basaraq ailəmi öyrən...</p>
</header>

<div id="familyScroll" style="height:1620vh;">
  <div class="family-sticky">
    <div class="family-index" id="familyIndex">1 / 27</div>
    <div class="polaroid-wrap">
      <div class="tape"></div>
      <div class="polaroid" id="familyCard">
        <div class="photo-frame"><div class="photo-letter" id="famAvatar"></div></div>
        <div class="cap-name" id="famName"></div>
        <div class="cap-rel" id="famRel"></div>
      </div>
    </div>
    <div class="fam-nav">
      <button class="fam-nav-btn" id="famPrevBtn">← Əvvəlki</button>
      <button class="fam-nav-btn" id="famNextBtn">Növbəti →</button>
    </div>
  </div>
</div>

<script>
function checkPassword() {
  const password = document.getElementById('passInput').value;
  if (password === "12345") { 
    document.getElementById('loginOverlay').style.display = 'none';
    startLoaderSequence();
  } else {
    document.getElementById('errorMsg').textContent = "Şifrə yanlışdır!";
  }
}

function startLoaderSequence() {
  const loaderStatus = document.getElementById('loaderStatus');
  const loaderFill = document.getElementById('loaderFill');
  const loaderPercent = document.getElementById('loaderPercent');
  const loaderEl = document.getElementById('loader');
  const loadingSteps = [
    "Fotolar tozdan təmizlənir...",
    "Albom vərəqlənir...",
    "Ailə axtarılır...",
    "Xatirələr toplanır...",
    "Albom açılır..."
  ];
  let progress = 0;
  let stepIndex = 0;
  const loadingInterval = setInterval(() => {
    progress += Math.random() * 12 + 4;
    if(progress >= 100) progress = 100;
    loaderFill.style.width = progress + '%';
    loaderPercent.textContent = Math.floor(progress) + '%';
    const newStepIndex = Math.min(loadingSteps.length - 1, Math.floor((progress / 100) * loadingSteps.length));
    if(newStepIndex !== stepIndex){
      stepIndex = newStepIndex;
      loaderStatus.textContent = loadingSteps[stepIndex];
    }
    if(progress >= 100){
      clearInterval(loadingInterval);
      setTimeout(() => { loaderEl.classList.add('hide'); }, 400);
    }
  }, 220);
}
  
const family = [
  ["Nigar","Anam"], ["İlqar","Atam"], ["Kənan","Qardaşım"], ["Şükran","Bacım"],
  ["Sənan","Qardaşım"], ["Afət","Bibim"], ["Hökümə",""], ["Gülzar","Nənəm"],
  ["Sabir","Babam"], ["Əsli","Nənəm"], ["Məhəmməd","Babam"], ["Əkbər","Babam"],
  ["Yaqut","Nənəm"], ["Sayalı","Xalam"], ["Aynur","Xalam"], ["Süleyman","Dayım"],
  ["Ələkbər","Dayım"], ["Zəminə","Xalam D.D"], ["Aytən","Xalam D.D"], ["Nunuş","Xalam"],
  ["Emil","Dayım D.D"], ["Gülşən","Xalam Qızı"], ["Xəyal","Xalam oğlu"], ["İslam","Xalam Oğlu"],
  ["Mələk","Dayım Qızı"], ["Fidan","Xalam Qızı"], ["Ayxan","Dayım Oğlu"]
];

const warmBg = document.getElementById('warmBg');
for(let i = 0; i < 26; i++){
  const m = document.createElement('div');
  const size = 4 + Math.random() * 8;
  m.className = 'mote';
  m.style.width = size + 'px';
  m.style.height = size + 'px';
  m.style.left = Math.random() * 100 + '%';
  m.style.top = (100 + Math.random() * 20) + '%';
  m.style.animationDuration = (14 + Math.random() * 16) + 's';
  m.style.animationDelay = (Math.random() * 16) + 's';
  m.style.opacity = 0.3 + Math.random() * 0.4;
  warmBg.appendChild(m);
}

const familyScrollEl = document.getElementById('familyScroll');
const familyCardEl = document.getElementById('familyCard');
const famAvatarEl = document.getElementById('famAvatar');
const famNameEl = document.getElementById('famName');
const famRelEl = document.getElementById('famRel');
const familyIndexEl = document.getElementById('familyIndex');

let famCurrentIndex = -1;
familyScrollEl.style.height = (family.length * 60) + 'vh';

function showFamilyMember(idx){
  const person = family[idx];
  famAvatarEl.textContent = person[0].charAt(0);
  famNameEl.textContent = person[0];
  famRelEl.textContent = person[1] || 'Ailə Üzvü';
  familyIndexEl.textContent = (idx + 1) + ' / ' + family.length;
  familyCardEl.style.transform = 'rotate(' + (Math.random() * 6 - 3).toFixed(1) + 'deg)';
  famCurrentIndex = idx;
}
showFamilyMember(0);

function switchToMember(idx){
  idx = Math.min(family.length - 1, Math.max(0, idx));
  if(idx === famCurrentIndex) return;
  familyCardEl.classList.add('switching');
  setTimeout(() => {
    showFamilyMember(idx);
    familyCardEl.classList.remove('switching');
  }, 160);
}

document.getElementById('famPrevBtn').addEventListener('click', () => switchToMember(famCurrentIndex - 1));
document.getElementById('famNextBtn').addEventListener('click', () => switchToMember(famCurrentIndex + 1));

function updateFamilyScroll(){
  const scrollable = familyScrollEl.offsetHeight - window.innerHeight;
  if(scrollable <= 0) return;
  const rect = familyScrollEl.getBoundingClientRect();
  const scrolled = -rect.top;
  const progress = Math.min(1, Math.max(0, scrolled / scrollable));
  const idx = Math.min(family.length - 1, Math.max(0, Math.floor(progress * family.length)));
  switchToMember(idx);
}
window.addEventListener('scroll', updateFamilyScroll, { passive:true });
</script>
</body>
</html>
