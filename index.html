<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TƏRLAN FIGHTERS // SELECT YOUR CHARACTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f;
    --cyan:#00fff2;
    --pink:#ff2e88;
    --yellow:#ffe600;
    --panel:#14141f;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; min-height:100%;
    background: var(--bg);
    font-family:'VT323', monospace;
    color:#e8e8f0;
    overflow-x:hidden;
    -webkit-font-smoothing:none;
  }

  #crt{
    position:fixed; inset:0; z-index:50; pointer-events:none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0) 4px
    );
    mix-blend-mode:multiply;
  }
  #vignette{
    position:fixed; inset:0; z-index:49; pointer-events:none;
    box-shadow: inset 0 0 160px 60px rgba(0,0,0,0.75);
  }
  #flicker{
    position:fixed; inset:0; z-index:48; pointer-events:none;
    background:#fff; opacity:0;
    animation: flick 7s infinite;
  }
  @keyframes flick{
    0%,96%,100%{ opacity:0; }
    97%{ opacity:.02; }
    98%{ opacity:0; }
    99%{ opacity:.015; }
  }

  #boot{
    position:fixed; inset:0; z-index:100;
    background:#000;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px;
    transition:opacity .5s ease, visibility .5s ease;
  }
  #boot.hide{ opacity:0; visibility:hidden; pointer-events:none; }
  .boot-logo{
    font-family:'Press Start 2P', monospace;
    font-size: clamp(18px, 4vw, 34px);
    color: var(--yellow);
    text-shadow: 3px 0 var(--pink), -3px 0 var(--cyan);
    letter-spacing:2px;
    text-align:center;
  }
  .boot-sub{
    font-family:'VT323', monospace;
    font-size:22px;
    color: var(--cyan);
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }
  .boot-bar{
    width:min(280px,70vw); height:14px;
    border:2px solid var(--cyan);
    padding:2px;
  }
  .boot-bar-fill{
    height:100%; width:0%;
    background: repeating-linear-gradient(90deg, var(--pink), var(--pink) 8px, var(--yellow) 8px, var(--yellow) 16px);
  }

  #title{
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px;
    text-align:center; padding: 40px 16px;
    opacity:0; transition:opacity .8s ease;
  }
  #title.show{ opacity:1; }
  .title-logo{
    font-family:'Press Start 2P', monospace;
    font-size: clamp(20px, 6vw, 46px);
    color: var(--yellow);
    text-shadow: 4px 0 var(--pink), -4px 0 var(--cyan);
    letter-spacing:3px;
    line-height:1.6;
  }
  .title-sub{ font-size:22px; color:var(--cyan); letter-spacing:2px; }
  .press-start{
    font-family:'Press Start 2P', monospace;
    font-size:14px;
    color:#fff;
    background: var(--pink);
    padding:16px 26px;
    cursor:pointer;
    border:none;
    animation: blink 1.1s steps(1) infinite;
    letter-spacing:2px;
  }
  .press-start:hover{ background: var(--yellow); color:#000; }

  #select{
    display:none;
    min-height:100vh;
    padding: 30px 16px 60px;
  }
  #select.show{ display:block; }
  .select-header{
    text-align:center; margin-bottom:26px;
  }
  .select-title{
    font-family:'Press Start 2P', monospace;
    font-size: clamp(14px, 3vw, 22px);
    color: var(--cyan);
    text-shadow: 2px 0 var(--pink);
    letter-spacing:2px;
  }
  .select-sub{ color:#aab; font-size:18px; margin-top:8px; }

  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap:14px;
    max-width:1200px;
    margin:0 auto;
  }
  .fighter{
    background: var(--panel);
    border:2px solid #2a2a3a;
    padding:10px 8px 12px;
    text-align:center;
    cursor:pointer;
    position:relative;
    transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
  }
  .fighter:hover, .fighter:focus-visible{
    transform: translateY(-4px);
    border-color: var(--cyan);
    box-shadow: 0 0 0 2px var(--cyan), 0 0 18px rgba(0,255,242,.5);
    outline:none;
  }
  .fighter .num{
    position:absolute; top:2px; left:4px;
    font-family:'Press Start 2P', monospace;
    font-size:8px; color:#666;
  }
  .fighter .ribbon{
    position:absolute; top:0px; right:4px;
    font-size:14px;
  }
  .fighter .avatar{
    width:56px; height:56px; margin:14px auto 8px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P', monospace;
    font-size:20px; color:#0a0a0f;
    box-shadow: 0 0 14px currentColor;
  }
  .fighter .fname{
    font-size:16px; color:#fff; letter-spacing:.5px;
  }

  #reveal{
    position:fixed; inset:0; z-index:70;
    background: rgba(5,5,10,.95);
    display:flex; align-items:center; justify-content:center;
    opacity:0; visibility:hidden; pointer-events:none;
    transition: opacity .3s ease, visibility .3s ease;
  }
  #reveal.show{ opacity:1; visibility:visible; pointer-events:all; }
  .vs-card{
    width:min(420px,88vw);
    background: var(--panel);
    border:3px solid var(--cyan);
    box-shadow: 0 0 40px rgba(0,255,242,.4);
    padding: 34px 26px 28px;
    text-align:center;
    transform: scale(.8);
    transition: transform .25s cubic-bezier(.2,1.4,.4,1);
  }
  #reveal.show .vs-card{ transform: scale(1); }
  .vs-label{
    font-family:'Press Start 2P', monospace;
    font-size:11px; color: var(--yellow); letter-spacing:3px;
    margin-bottom:18px;
  }
  .vs-avatar{
    width:110px; height:110px; margin:0 auto 18px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P', monospace;
    font-size:42px; color:#0a0a0f;
    box-shadow: 0 0 30px currentColor;
  }
  .vs-name{
    font-family:'Press Start 2P', monospace;
    font-size: clamp(16px,4vw,24px);
    color:#fff;
    text-shadow: 2px 0 var(--pink), -2px 0 var(--cyan);
    letter-spacing:1px;
    margin-bottom:14px;
  }
  .vs-class{
    font-size:20px; color: var(--cyan);
    border-top:1px dashed #3a3a4a; border-bottom:1px dashed #3a3a4a;
    padding:10px 0; margin-bottom:22px;
  }
  .vs-close{
    font-family:'Press Start 2P', monospace;
    font-size:12px;
    background: var(--pink); color:#fff; border:none;
    padding:12px 22px; cursor:pointer; letter-spacing:2px;
  }
  .vs-close:hover{ background: var(--yellow); color:#000; }
  .memorial-note{
    font-size:15px; color:#aab;
    font-style:italic;
    margin:-10px 0 20px;
  }

  @media (max-width:480px){
    .grid{ grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap:10px; }
    .fighter .avatar{ width:46px; height:46px; font-size:16px; }
    .fighter .fname{ font-size:13px; }
  }
</style>
</head>
<body>

<div id="crt"></div>
<div id="vignette"></div>
<div id="flicker"></div>

<div id="boot">
  <div class="boot-logo">TƏRLAN<br>FIGHTERS</div>
  <div class="boot-bar"><div class="boot-bar-fill" id="bootFill"></div></div>
  <div class="boot-sub" id="bootStatus">LOADING...</div>
</div>

<div id="title">
  <div class="title-logo">TƏRLAN<br>FIGHTERS</div>
  <div class="title-sub">27 FIGHTERS AVAILABLE</div>
  <button class="press-start" id="startBtn">PRESS START</button>
</div>

<div id="select">
  <div class="select-header">
    <div class="select-title">SELECT YOUR CHARACTER</div>
    <div class="select-sub">Bir döyüşçüyə klik et</div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div id="reveal">
  <div class="vs-card">
    <div class="vs-label">FIGHTER DATA</div>
    <div class="vs-avatar" id="revealAvatar"></div>
    <div class="vs-name" id="revealName"></div>
    <div class="vs-class">CLASS: <span id="revealRel"></span></div>
    <div id="revealMemorial" class="memorial-note" style="display:none;">🕊️ Allah rəhmət etsin, məkanın Cənnət olsun</div>
    <button class="vs-close" id="revealClose">B — GERİ QAYIT</button>
  </div>
</div>

<script>
const family = [
  ["Nigar","Anam"], ["İlqar","Atam"], ["Kənan","Qardaşım"], ["Şükran","Bacım"],
  ["Sənan","Qardaşım"], ["Hökümə","Gəlinim"], ["Afət","Bibim"], ["Gülzar","Nənəm"],
  ["Sabir","Babam"], ["Əsli","Nənəm"], ["Məhəmməd","Babam"], ["Əkbər","Babam"],
  ["Yaqut","Nənəm"], ["Sayalı","Xalam"], ["Aynur","Xalam"], ["Süleyman","Dayım"],
  ["Ələkbər","Dayım"], ["Zəminə","Yengəm"], ["Aytən","Yengəm"], ["Nunuş","Xalam"],
  ["Emil","Xalam Əri"], ["Gülşən","Xalam Qızı"], ["Xəyal","Xalam Oğlu"], ["İslam","Xalam Oğlu"],
  ["Mələk","Dayım Qızı"], ["Fidan","Xalam Qızı"], ["Ayxan","Dayım Oğlu"]
];

const palette = ['#00fff2','#ff2e88','#ffe600','#7cff6b','#ff8a00','#b06bff'];

const gridEl = document.getElementById('grid');
family.forEach((p, i) => {
  const color = palette[i % palette.length];
  const isDeceased = p[0] === 'Sabir';
  const card = document.createElement('div');
  card.className = 'fighter';
  card.tabIndex = 0;
  card.innerHTML = `
    <div class="num">${String(i+1).padStart(2,'0')}</div>
    ${isDeceased ? '<div class="ribbon">🕊️</div>' : ''}
    <div class="avatar" style="background:${color}; color:${color};"><span style="color:#0a0a0f;">${p[0].charAt(0)}</span></div>
    <div class="fname">${p[0]}</div>
  `;
  const activate = () => openReveal(p, color, isDeceased);
  card.addEventListener('click', activate);
  card.addEventListener('keydown', e => { if(e.key === 'Enter') activate(); });
  gridEl.appendChild(card);
});

function openReveal(person, color, isDeceased){
  document.getElementById('revealAvatar').style.background = color;
  document.getElementById('revealAvatar').style.color = color;
  document.getElementById('revealAvatar').textContent = person[0].charAt(0);
  document.getElementById('revealAvatar').style.color = '#0a0a0f';
  document.getElementById('revealName').textContent = person[0].toUpperCase();
  document.getElementById('revealRel').textContent = person[1] || 'Ailə Üzvü';
  document.getElementById('revealMemorial').style.display = isDeceased ? 'block' : 'none';
  document.getElementById('reveal').classList.add('show');
}
document.getElementById('revealClose').addEventListener('click', () => {
  document.getElementById('reveal').classList.remove('show');
});
document.getElementById('reveal').addEventListener('click', e => {
  if(e.target.id === 'reveal') document.getElementById('reveal').classList.remove('show');
});

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('title').classList.remove('show');
  setTimeout(() => {
    document.getElementById('title').style.display = 'none';
    document.getElementById('select').classList.add('show');
  }, 500);
});

/* boot sequence */
const bootSteps = [
  "LOADING...",
  "AİLƏ MƏLUMATLARI OXUNUR...",
  "27 DÖYÜŞÇÜ TAPILDI...",
  "SABİR BABANIN XATİRƏLƏRİ YÜKLƏNİR...",
  "GƏNCƏ SERVERİNƏ QOŞULUR...",
  "BAKI SERVERİNƏ QOŞULUR...",
  "ŞÜKRANIN FOTOLARI SIXILIR...",
  "KƏNANIN YÜKLƏMƏ SÜRƏTİ YOXLANILIR...",
  "TƏRLANIN İCAZƏSİ SORUŞULUR...",
  "PİKSELLƏR PARLADILIR...",
  "NEON İŞIQLAR QIZDIRILIR...",
  "SON YOXLAMA APARILIR...",
  "READY!"
];
let bi = -1;
const bootDuration = 15000; /* 15 saniyə */
const bootStart = performance.now();
const bootFill = document.getElementById('bootFill');
const bootStatus = document.getElementById('bootStatus');

function bootTick(){
  const elapsed = performance.now() - bootStart;
  const pct = Math.min(100, (elapsed / bootDuration) * 100);
  bootFill.style.width = pct + '%';

  const stepIdx = Math.min(bootSteps.length - 1, Math.floor((pct / 100) * bootSteps.length));
  if(stepIdx !== bi){
    bi = stepIdx;
    bootStatus.textContent = bootSteps[bi];
  }

  if(pct >= 100){
    setTimeout(() => {
      document.getElementById('boot').classList.add('hide');
      document.getElementById('title').classList.add('show');
    }, 400);
    return;
  }
  requestAnimationFrame(bootTick);
}
bootTick();
</script>

</body>
</html>
