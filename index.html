<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailə Kainatı — Tərlanın 3D Dünyası</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #05030c;
    --violet: #8b5cf6;
    --cyan: #22d3ee;
    --pink: #f472b6;
    --text: #f2eefc;
    --muted: #a89fc9;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%;
    background: var(--bg);
    font-family:'Inter', sans-serif;
    color: var(--text);
    overflow-x:hidden;
  }
  #bg-canvas{
    position:fixed; top:0; left:0; width:100%; height:100%; z-index:12; display:block;
    opacity:1; visibility:visible;
    transition: opacity 1.2s ease;
  }
  #bg-canvas.journey-hidden{ opacity:0; visibility:hidden; pointer-events:none; }
  .scene-wrap{
    position:fixed; inset:0; z-index:14;
    display:flex; align-items:center; justify-content:center;
    perspective: 1400px;
    opacity:1; visibility:visible;
    transition: opacity 1.2s ease;
  }
  .scene-wrap.journey-hidden{ opacity:0; visibility:hidden; pointer-events:none; }
  header.hero{
    position:fixed; top:0; left:0; width:100%; z-index:13;
    text-align:center; padding: 28px 20px 0;
    pointer-events:none;
    opacity:1; visibility:visible;
    transition: opacity 1.2s ease;
  }
  header.hero.journey-hidden{ opacity:0; visibility:hidden; }
  .eyebrow{
    font-family:'Orbitron', sans-serif;
    font-size:11px; letter-spacing:5px; text-transform:uppercase;
    color: var(--cyan);
    opacity:.85;
    margin:0 0 6px;
  }
  h1{
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    font-size: clamp(22px, 4.5vw, 42px);
    margin:0;
    background: linear-gradient(90deg, var(--violet), var(--cyan) 50%, var(--pink));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow: 0 0 40px rgba(139,92,246,.35);
    letter-spacing:1px;
  }
  .sub{
    font-size:13px; color:var(--muted); margin-top:8px; letter-spacing:.3px;
  }
  .orbit{
    position:relative;
    width: 1px; height: 1px;
    transform-style: preserve-3d;
    animation: spin 60s linear infinite;
  }
  .orbit.paused{ animation-play-state: paused; }
  @keyframes spin{
    from{ transform: rotateY(0deg); }
    to{ transform: rotateY(360deg); }
  }
  .card{
    position:absolute;
    top:-46px; left:-72px;
    width:144px; height:92px;
    border-radius:14px;
    background: linear-gradient(160deg, rgba(139,92,246,.16), rgba(34,211,238,.08));
    border:1px solid rgba(168,159,201,.35);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding:8px;
    cursor:pointer;
    pointer-events:all;
    transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease, background .35s ease;
    backface-visibility: hidden;
  }
  .card:hover{
    border-color: var(--cyan);
    box-shadow: 0 0 28px rgba(34,211,238,.45), 0 0 60px rgba(139,92,246,.25);
    background: linear-gradient(160deg, rgba(139,92,246,.3), rgba(34,211,238,.18));
  }
  .card .name{
    font-family:'Orbitron', sans-serif;
    font-weight:700;
    font-size:14px;
    color: var(--text);
    text-shadow: 0 0 12px rgba(255,255,255,.25);
  }
  .card .rel{
    font-size:10.5px;
    color: var(--muted);
    margin-top:4px;
    letter-spacing:.4px;
  }
  .card .dot{
    width:6px; height:6px; border-radius:50%;
    background: var(--pink);
    box-shadow: 0 0 10px var(--pink), 0 0 20px var(--pink);
    margin-bottom:6px;
  }

  .detail{
    position:fixed; z-index:20; inset:0;
    display:flex; align-items:center; justify-content:center;
    background: rgba(2,1,8,.86);
    backdrop-filter: blur(6px);
    opacity:0; pointer-events:none;
    transition: opacity .3s ease;
  }
  .detail.show{ opacity:1; pointer-events:all; }
  .detail-card{
    width:min(420px, 88vw);
    border-radius:26px;
    padding: 48px 32px 38px;
    text-align:center;
    background: linear-gradient(160deg, rgba(139,92,246,.2), rgba(244,114,182,.08));
    border:1px solid rgba(168,159,201,.4);
    box-shadow: 0 0 70px rgba(139,92,246,.4), 0 0 140px rgba(34,211,238,.15);
    transform: scale(.85);
    transition: transform .35s cubic-bezier(.2,1.4,.4,1);
  }
  .detail.show .detail-card{ transform: scale(1); }
  .avatar-circle{
    width:104px; height:104px;
    margin: 0 auto 22px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background: linear-gradient(160deg, rgba(139,92,246,.35), rgba(34,211,238,.2));
    border:1.5px solid rgba(255,255,255,.25);
    box-shadow: 0 0 40px rgba(139,92,246,.55), 0 0 80px rgba(34,211,238,.3), inset 0 0 30px rgba(255,255,255,.08);
    position:relative;
  }
  .avatar-circle::after{
    content:'';
    position:absolute; inset:-6px;
    border-radius:50%;
    border:1px solid rgba(34,211,238,.35);
  }
  .avatar-letter{
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    font-size:40px;
    background: linear-gradient(160deg, var(--cyan), var(--pink));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .meet-label{
    font-family:'Orbitron', sans-serif;
    font-size:11px; letter-spacing:5px; text-transform:uppercase;
    color: var(--cyan); opacity:.8;
    margin-bottom:10px;
  }
  .detail-card .big-name{
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    font-size: 30px;
    background: linear-gradient(90deg, var(--cyan), var(--pink));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .detail-card .big-rel{
    margin-top:10px; font-size:14px; color:var(--muted); letter-spacing:.5px;
  }
  .meet-divider{
    width:44px; height:2px; margin:22px auto;
    background: linear-gradient(90deg, var(--violet), var(--cyan), var(--pink));
    border-radius:2px; opacity:.7;
  }
  .detail-card .close{
    margin-top: 8px;
    display:inline-block;
    font-family:'Orbitron', sans-serif;
    font-size:11px; letter-spacing:2px;
    color: var(--bg);
    background: linear-gradient(90deg, var(--cyan), var(--violet));
    border:none; border-radius:999px;
    padding:10px 22px;
    cursor:pointer;
  }
  .meet-nav-btn{
    position:absolute; top:50%; transform:translateY(-50%);
    width:48px; height:48px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background: rgba(139,92,246,.15);
    border:1px solid rgba(168,159,201,.4);
    color: var(--text);
    font-family:'Orbitron', sans-serif; font-size:18px;
    cursor:pointer;
    transition:.25s;
    z-index:21;
  }
  .meet-nav-btn:hover{
    background: rgba(139,92,246,.35);
    border-color: var(--cyan);
    box-shadow: 0 0 24px rgba(34,211,238,.4);
  }
  .meet-nav-btn.prev{ left: 4%; }
  .meet-nav-btn.next{ right: 4%; }
  @media (max-width: 640px){
    .meet-nav-btn{ width:40px; height:40px; font-size:15px; }
    .meet-nav-btn.prev{ left: 2%; }
    .meet-nav-btn.next{ right: 2%; }
  }

  @media (prefers-reduced-motion: reduce){
    .orbit{ animation: none; }
  }

  #journey{
    position:relative;
    height:350vh;
  }
  .journey-sticky{
    position:sticky; top:0; left:0;
    width:100%; height:100vh;
    overflow:hidden;
    z-index:9;
  }
  #journeyCanvas{
    position:absolute; inset:0;
    width:100%; height:100%;
    display:block;
    z-index:10;
  }
  .journey-fade{
    position:absolute; inset:0;
    background: var(--bg);
    opacity:0;
    pointer-events:none;
    z-index:11;
  }
  .journey-label{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    text-align:center; width:min(360px, 80vw);
    font-family:'Orbitron', sans-serif; font-size:14px; letter-spacing:2.5px;
    color: var(--cyan); text-transform:uppercase;
    opacity:0;
    transition:opacity .6s ease;
    text-shadow: 0 0 20px rgba(34,211,238,.5);
    z-index:12;
    pointer-events:none;
  }
  .journey-label.show{ opacity:1; }
  .journey-sticky.journey-done{ opacity:0 !important; visibility:hidden !important; pointer-events:none !important; }

  .loader{
    position:fixed; inset:0; z-index:100;
    background: var(--bg);
    display:flex; align-items:center; justify-content:center;
    transition: opacity .8s ease, visibility .8s ease;
  }
  .loader.hide{ opacity:0; visibility:hidden; pointer-events:none; }
  .loader-inner{ text-align:center; width:min(320px, 80vw); }
  .loader-title{
    font-family:'Orbitron', sans-serif; font-weight:900; letter-spacing:2px;
    font-size:20px; margin-bottom:18px;
    background: linear-gradient(90deg, var(--violet), var(--cyan), var(--pink));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .loader-status{
    font-size:12.5px; color:var(--muted); letter-spacing:.4px; margin-bottom:16px;
    min-height:16px;
  }
  .loader-bar{
    width:100%; height:3px; border-radius:999px; background: rgba(168,159,201,.2);
    overflow:hidden;
  }
  .loader-fill{
    height:100%; width:0%;
    background: linear-gradient(90deg, var(--violet), var(--cyan), var(--pink));
    box-shadow: 0 0 12px var(--cyan);
    transition: width .3s ease;
  }
  .loader-percent{
    margin-top:10px; font-family:'Orbitron', sans-serif; font-size:11px; color:var(--cyan); letter-spacing:1px;
  }
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-inner">
    <div class="loader-title">AİLƏ KAİNATI</div>
    <div class="loader-status" id="loaderStatus">Ulduzlar yaradılır...</div>
    <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
    <div class="loader-percent" id="loaderPercent">0%</div>
  </div>
</div>

<div id="journey">
  <div class="journey-sticky">
    <canvas id="journeyCanvas"></canvas>
    <div class="journey-fade" id="journeyFade"></div>
    <div class="journey-label" id="journeyLabel"></div>
  </div>
</div>

<canvas id="bg-canvas" class="journey-hidden"></canvas>

<header class="hero journey-hidden">
  <p class="eyebrow">Tərlanın Sistemi // Portal Aktiv</p>
  <h1>AİLƏ KAİNATI</h1>
  <p class="sub">27 ulduz, bir qalaktika. Klik et, kim olduğunu gör.</p>
</header>

<div class="scene-wrap journey-hidden">
  <div class="orbit" id="orbit"></div>
</div>

<div class="detail" id="detail">
  <button class="meet-nav-btn prev" id="prevBtn" aria-label="Əvvəlki">←</button>
  <div class="detail-card">
    <div class="meet-label">Tanış Ol</div>
    <div class="avatar-circle"><div class="avatar-letter" id="detailAvatar"></div></div>
    <div class="big-name" id="detailName"></div>
    <div class="big-rel" id="detailRel"></div>
    <div class="meet-divider"></div>
    <button class="close" onclick="closeDetail()">BAĞLA</button>
  </div>
  <button class="meet-nav-btn next" id="nextBtn" aria-label="Növbəti">→</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============ DATA ============ */
const family = [
  ["Nigar","Anam"], ["İlqar","Atam"], ["Kənan","Qardaşım"], ["Şükran","Bacım"],
  ["Sənan","Qardaşım"], ["Afət","Bibim"], ["Hökümə",""], ["Gülzar","Nənəm"],
  ["Sabir","Babam"], ["Əsli","Nənəm"], ["Məhəmməd","Babam"], ["Əkbər","Babam"],
  ["Yaqut","Nənəm"], ["Sayalı","Xalam"], ["Aynur","Xalam"], ["Süleyman","Dayım"],
  ["Ələkbər","Dayım"], ["Zəminə","Xalam D.D"], ["Aytən","Xalam D.D"], ["Nunuş","Xalam"],
  ["Emil","Dayım D.D"], ["Gülşən","Xalam Qızı"], ["Xəyal","Xalam oğlu"], ["İslam","Xalam Oğlu"],
  ["Mələk","Dayım Qızı"], ["Fidan","Xalam Qızı"], ["Ayxan","Dayım Oğlu"]
];

/* ============ CSS 3D ORBIT OF FAMILY CARDS ============ */
const orbit = document.getElementById('orbit');
const radius = 340;
const n = family.length;
family.forEach((person, i) => {
  const angle = (360 / n) * i;
  const card = document.createElement('div');
  card.className = 'card';
  card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
  card.innerHTML = `
    <div class="dot"></div>
    <div class="name">${person[0]}</div>
    <div class="rel">${person[1] || 'Ailə Üzvü'}</div>
  `;
  card.addEventListener('click', () => openDetail(i));
  orbit.appendChild(card);
});

let currentIndex = 0;

function renderDetail(index){
  const person = family[index];
  document.getElementById('detailAvatar').textContent = person[0].charAt(0);
  document.getElementById('detailName').textContent = person[0];
  document.getElementById('detailRel').textContent = person[1] || 'Ailə Üzvü';
  currentIndex = index;
}

function openDetail(index){
  renderDetail(index);
  document.getElementById('detail').classList.add('show');
  orbit.classList.add('paused');
}
function closeDetail(){
  document.getElementById('detail').classList.remove('show');
  orbit.classList.remove('paused');
}

document.getElementById('prevBtn').addEventListener('click', () => {
  renderDetail((currentIndex - 1 + family.length) % family.length);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  renderDetail((currentIndex + 1) % family.length);
});

/* drag to rotate manually */
let isDragging = false, lastX = 0, dragRotation = 0, hasDragged = false;
const wrap = document.querySelector('.scene-wrap');
wrap.addEventListener('pointerdown', e => {
  isDragging = true;
  hasDragged = false;
  lastX = e.clientX;
});
window.addEventListener('pointerup', () => {
  isDragging = false;
});
window.addEventListener('pointermove', e => {
  if(!isDragging) return;
  const delta = e.clientX - lastX;
  lastX = e.clientX;
  if(Math.abs(delta) > 1){
    if(!hasDragged){
      hasDragged = true;
      orbit.style.animation = 'none';
    }
    dragRotation += delta * 0.3;
    orbit.style.transform = `rotateY(${dragRotation}deg)`;
  }
});

/* ============ THREE.JS SPACE BACKGROUND ============ */
const canvas = document.getElementById('bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.z = 900;
camera.position.x = 45;
camera.position.y = -25;

// starfield
function makeStars(count, spread, size, color, opacity){
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  for(let i=0;i<count;i++){
    positions[i*3]   = (Math.random()-0.5) * spread;
    positions[i*3+1] = (Math.random()-0.5) * spread;
    positions[i*3+2] = (Math.random()-0.5) * spread;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color, size, transparent:true, opacity, depthWrite:false, blending: THREE.AdditiveBlending });
  return new THREE.Points(geo, mat);
}
const starsFar = makeStars(1800, 1400, 1.1, 0xffffff, 0.6);
const starsNear = makeStars(500, 700, 1.8, 0x22d3ee, 0.7);
const starsPink = makeStars(300, 900, 1.6, 0xf472b6, 0.5);
scene.add(starsFar, starsNear, starsPink);

// glowing portal core
const coreGeo = new THREE.IcosahedronGeometry(11, 1);
const coreMat = new THREE.MeshBasicMaterial({ color: 0x8b5cf6, wireframe:true, transparent:true, opacity:0.55 });
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

const coreGeo2 = new THREE.IcosahedronGeometry(7.5, 1);
const coreMat2 = new THREE.MeshBasicMaterial({ color: 0x22d3ee, wireframe:true, transparent:true, opacity:0.5 });
const core2 = new THREE.Mesh(coreGeo2, coreMat2);
scene.add(core2);

const glowGeo = new THREE.SphereGeometry(5.2, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({ color: 0xf472b6, transparent:true, opacity:0.18 });
const glow = new THREE.Mesh(glowGeo, glowMat);
scene.add(glow);

// mouse parallax
let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

let introDone = false;

function animate(){
  requestAnimationFrame(animate);
  core.rotation.y += 0.0022;
  core.rotation.x += 0.0011;
  core2.rotation.y -= 0.0016;
  core2.rotation.x += 0.0009;
  starsFar.rotation.y += 0.00012;
  starsNear.rotation.y -= 0.00022;
  starsPink.rotation.y += 0.00017;

  if(introDone){
    camera.position.x += (mouseX * 14 - camera.position.x) * 0.03;
    camera.position.y += (-mouseY * 10 - camera.position.y) * 0.03;
  }
  camera.lookAt(scene.position);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ============ CAMERA FLYTHROUGH INTRO ============ */
function startCameraFlythrough(){
  const duration = 2600;
  const startTime = performance.now();
  const startPos = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
  const endPos = { x: 0, y: 0, z: 60 };

  function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }

  function flyStep(now){
    const t = Math.min(1, (now - startTime) / duration);
    const eased = easeOutCubic(t);
    camera.position.x = startPos.x + (endPos.x - startPos.x) * eased + Math.sin(t * Math.PI * 4) * (1 - eased) * 6;
    camera.position.y = startPos.y + (endPos.y - startPos.y) * eased;
    camera.position.z = startPos.z + (endPos.z - startPos.z) * eased;

    if(t < 1){
      requestAnimationFrame(flyStep);
    } else {
      introDone = true;
    }
  }
  requestAnimationFrame(flyStep);
}

/* ============ LOADING SEQUENCE ============ */
const loaderStatus = document.getElementById('loaderStatus');
const loaderFill = document.getElementById('loaderFill');
const loaderPercent = document.getElementById('loaderPercent');
const loaderEl = document.getElementById('loader');

const loadingSteps = [
  "Ulduzlar yaradılır...",
  "Portal aktivləşdirilir...",
  "Ailə axtarılır...",
  "Kainat qurulur...",
  "Giriş açılır..."
];

let progress = 0;
let stepIndex = 0;
loaderStatus.textContent = loadingSteps[0];

const loadingInterval = setInterval(() => {
  progress += Math.random() * 12 + 4;
  if(progress >= 100) progress = 100;

  loaderFill.style.width = progress + '%';
  loaderPercent.textContent = Math.floor(progress) + '%';

  const newStepIndex = Math.min(loadingSteps.length - 1, Math.floor((progress / 100) * loadingSteps.length));
  if(newStepIndex !== stepIndex){
    stepIndex = newStepIndex;
    loaderStatus.textContent = loadingSteps[stepIndex];
  }

  if(progress >= 100){
    clearInterval(loadingInterval);
    setTimeout(() => {
      loaderEl.classList.add('hide');
    }, 400);
  }
}, 220);

/* ============ SCROLL JOURNEY (space / planets / black hole) ============ */
const journeyEl = document.getElementById('journey');
const journeyCanvasEl = document.getElementById('journeyCanvas');
const journeyFadeEl = document.getElementById('journeyFade');
const journeyLabelEl = document.getElementById('journeyLabel');

const jRenderer = new THREE.WebGLRenderer({ canvas: journeyCanvasEl, antialias:true, alpha:true });
jRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
jRenderer.setSize(window.innerWidth, window.innerHeight);

const jScene = new THREE.Scene();
const jCamera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 3000);
jCamera.position.set(0, 0, 0);

const jStars = makeStars(2200, 1800, 1.2, 0xffffff, 0.7);
jScene.add(jStars);

const saturn = new THREE.Mesh(new THREE.SphereGeometry(14, 32, 32), new THREE.MeshBasicMaterial({ color: 0xE3C48A }));
saturn.position.set(-30, 12, -70);
jScene.add(saturn);
const saturnRing = new THREE.Mesh(new THREE.TorusGeometry(26, 2.6, 2, 80), new THREE.MeshBasicMaterial({ color: 0xC9A66B, transparent:true, opacity:0.75, side: THREE.DoubleSide }));
saturnRing.position.copy(saturn.position);
saturnRing.rotation.x = 1.3;
saturnRing.rotation.y = 0.2;
jScene.add(saturnRing);

const jupiter = new THREE.Mesh(new THREE.SphereGeometry(22, 32, 32), new THREE.MeshBasicMaterial({ color: 0xC98A4B }));
jupiter.position.set(35, -18, -190);
jScene.add(jupiter);
const jupiterBand1 = new THREE.Mesh(new THREE.TorusGeometry(19.4, 1.3, 8, 100), new THREE.MeshBasicMaterial({ color: 0xE0B27E, transparent:true, opacity:0.55 }));
jupiterBand1.position.copy(jupiter.position);
jupiterBand1.rotation.y = Math.PI / 2;
jScene.add(jupiterBand1);
const jupiterBand2 = new THREE.Mesh(new THREE.TorusGeometry(14.5, 1, 8, 100), new THREE.MeshBasicMaterial({ color: 0x8A5A2E, transparent:true, opacity:0.5 }));
jupiterBand2.position.copy(jupiter.position);
jupiterBand2.rotation.y = Math.PI / 2;
jScene.add(jupiterBand2);

const blackHole = new THREE.Mesh(new THREE.SphereGeometry(26, 32, 32), new THREE.MeshBasicMaterial({ color: 0x000000 }));
blackHole.position.set(0, 0, -320);
jScene.add(blackHole);

const journeyLabels = [
  { from: 0.05, to: 0.28, text: 'Fəzada irəliləyirik...' },
  { from: 0.32, to: 0.55, text: 'Bir planetin yanından keçirik...' },
  { from: 0.60, to: 0.82, text: 'Qara dəlik yaxınlaşır...' },
  { from: 0.86, to: 0.97, text: 'İçəri çəkilirik...' }
];

let finalRevealed = false;
function revealFinalScene(){
  document.querySelector('.journey-sticky').classList.add('journey-done');
  document.getElementById('bg-canvas').classList.remove('journey-hidden');
  document.querySelector('header.hero').classList.remove('journey-hidden');
  document.querySelector('.scene-wrap').classList.remove('journey-hidden');
  startCameraFlythrough();
}

function journeyLoop(){
  if(finalRevealed) return;
  requestAnimationFrame(journeyLoop);

  const rect = journeyEl.getBoundingClientRect();
  const scrollable = journeyEl.offsetHeight - window.innerHeight;
  const scrolled = -rect.top;
  const progress = Math.min(1, Math.max(0, scrolled / scrollable));

  jCamera.position.z = -progress * 300;
  jCamera.rotation.y = Math.sin(progress * Math.PI * 2) * 0.03;

  saturn.rotation.y += 0.002;
  saturnRing.rotation.z += 0.0015;
  jupiter.rotation.y += 0.0018;
  jStars.rotation.y += 0.0001;

  journeyFadeEl.style.opacity = progress > 0.86 ? Math.min(1, (progress - 0.86) / 0.13) : 0;

  let activeLabel = null;
  journeyLabels.forEach(l => { if(progress >= l.from && progress <= l.to) activeLabel = l.text; });
  if(activeLabel){
    journeyLabelEl.textContent = activeLabel;
    journeyLabelEl.classList.add('show');
  } else {
    journeyLabelEl.classList.remove('show');
  }

  jRenderer.render(jScene, jCamera);

  if(progress >= 0.995 && !finalRevealed){
    finalRevealed = true;
    revealFinalScene();
  }
}
journeyLoop();

window.addEventListener('resize', () => {
  jCamera.aspect = window.innerWidth / window.innerHeight;
  jCamera.updateProjectionMatrix();
  jRenderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
